<svg xmlns="http://www.w3.org/2000/svg" width="960" height="510" viewBox="0 0 960 510" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="bi" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="510" fill="#ffffff"/>
  <style>
    .b   { stroke:#334155; stroke-width:1.5; rx:6; }
    .t   { fill:#0f172a; font-size:11px; }
    .h   { fill:#0f172a; font-size:14px; font-weight:bold; }
    .x   { fill:#b91c1c; font-size:11px; font-weight:bold; }
  </style>

  <text x="480" y="26" text-anchor="middle" class="h" font-size="16">Concept mapping: Koordinator Coscheduling vs Native Workload API (k8s 1.35)</text>

  <!-- headers -->
  <rect class="b" x="40" y="48" width="350" height="34" fill="#dbeafe"/>
  <text x="215" y="70" text-anchor="middle" class="h">Koordinator Coscheduling</text>
  <rect class="b" x="570" y="48" width="350" height="34" fill="#dcfce7"/>
  <text x="745" y="70" text-anchor="middle" class="h">Native (Workload API + GangScheduling)</text>

  <!-- row 1: identity -->
  <rect class="b" x="40" y="96" width="350" height="46" fill="#eff6ff"/>
  <text x="215" y="114" text-anchor="middle" class="t">labels / annotations / PodGroup CRD</text>
  <text x="215" y="130" text-anchor="middle" class="t">(gang identity)</text>
  <line x1="392" y1="119" x2="568" y2="119" stroke="#64748b" stroke-width="1.3" marker-end="url(#bi)" marker-start="url(#bi)"/>
  <rect class="b" x="570" y="96" width="350" height="46" fill="#f0fdf4"/>
  <text x="745" y="114" text-anchor="middle" class="t">pod.Spec.WorkloadRef</text>
  <text x="745" y="130" text-anchor="middle" class="t">{ Name, PodGroup, PodGroupReplicaKey* }</text>

  <!-- row 2: scheduling unit -->
  <rect class="b" x="40" y="150" width="350" height="40" fill="#eff6ff"/>
  <text x="215" y="174" text-anchor="middle" class="t">a single Koord Gang (all-or-nothing)</text>
  <line x1="392" y1="170" x2="568" y2="170" stroke="#64748b" stroke-width="1.3" marker-end="url(#bi)" marker-start="url(#bi)"/>
  <rect class="b" x="570" y="150" width="350" height="40" fill="#f0fdf4"/>
  <text x="745" y="174" text-anchor="middle" class="t">a single native PodGroup (Gang.MinCount)</text>

  <!-- row 3: lifecycle container -->
  <rect class="b" x="40" y="198" width="350" height="50" fill="#f1f5f9"/>
  <text x="215" y="220" text-anchor="middle" class="t">(none - a Gang stands alone)</text>
  <text x="480" y="213" text-anchor="middle" class="x">no map</text>
  <rect class="b" x="570" y="198" width="350" height="50" fill="#f0fdf4"/>
  <text x="745" y="218" text-anchor="middle" class="t">Workload = lifecycle container (&#8804; 8 PG)</text>
  <text x="745" y="234" text-anchor="middle" class="t" font-style="italic">PodGroups scheduled INDEPENDENTLY</text>

  <!-- row 4: cross-gang all-or-nothing -->
  <rect class="b" x="40" y="256" width="350" height="40" fill="#eff6ff"/>
  <text x="215" y="280" text-anchor="middle" class="t">GangGroup (cross-gang all-or-nothing, &#8804;8)</text>
  <line x1="392" y1="271" x2="568" y2="271" stroke="#64748b" stroke-width="1.3" marker-end="url(#bi)" marker-start="url(#bi)"/>
  <rect class="b" x="570" y="256" width="350" height="40" fill="#f0fdf4"/>
  <text x="745" y="271" text-anchor="middle" class="t">Workload (multi-PodGroup, &#8804;8)</text>
  <text x="745" y="287" text-anchor="middle" class="t" font-style="italic" fill="#b45309">&gt;8, or as preemption unit: no map</text>

  <!-- row 5: preemption -->
  <rect class="b" x="40" y="304" width="350" height="46" fill="#eff6ff"/>
  <text x="215" y="323" text-anchor="middle" class="t">strict/non-strict GangGroup preemption</text>
  <text x="215" y="339" text-anchor="middle" class="t">PostFilter (#2622)</text>
  <text x="480" y="331" text-anchor="middle" class="x">no map</text>
  <rect class="b" x="570" y="304" width="350" height="46" fill="#f8fafc"/>
  <text x="745" y="323" text-anchor="middle" class="t">DisruptionMode { Single / All }</text>
  <text x="745" y="339" text-anchor="middle" class="t">KEP-5710, alpha 1.36 (none in 1.35); different axis</text>

  <!-- footnotes -->
  <text x="480" y="376" text-anchor="middle" class="t" font-style="italic" fill="#b45309">Correctness: a native Workload is NOT a Koord GangGroup. Native PodGroup &#8776; Koord Gang; the Workload only groups PodGroups for lifecycle.</text>
  <text x="480" y="394" text-anchor="middle" class="t" font-style="italic" fill="#b45309">Strict/non-strict (pre-bind scheduling-cycle rollback) and DisruptionMode (post-bind disruption of running pods) are different axes; no mapping is proposed -- strict/non-strict is koord-only.</text>
  <text x="480" y="412" text-anchor="middle" class="t" font-style="italic" fill="#b45309">Match-policy has no cross-equivalent. * PodGroupReplicaKey is deprecated upstream in 1.36.</text>
</svg>
